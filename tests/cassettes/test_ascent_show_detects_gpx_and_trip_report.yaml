        \   \t\t        <h1>Ascent of Longs Peak on 2025-10-05</h1><h2>Climber: <a
        href=climber.aspx?cid=53399>alex q</a></h2><table class=\"gray\" width=\"49%\"
        align=\"left\"><tr><td><b>Date:</b></td><td >Sunday, October 5, 2025</td></tr><tr><td><b>Ascent
        Type:</b></td><td><img src=\"../image/suc.gif\">&nbsp;&nbsp;Successful Summit
        Attained</td></tr><tr><td><b>Peak:</b></td><td ><a href=../peak.aspx?pid=5642>Longs
        Peak</a></td></tr><tr><td>&nbsp;&nbsp;&nbsp;&nbsp;Location:</td><td >USA-Colorado</td></tr><tr><td>&nbsp;&nbsp;&nbsp;&nbsp;Elevation:</td><td
        >14257 ft / 4346 m</td></tr><tr><td colspan=2><h2>Ascent Trip Report</h2><br
        /><br />Keyhole in winter conditions. The Ledges had less than 20ft of truly
        exposed terrain (around the rebars if I recall), and the rest was mild. Spikes
        are helpful, don't hesitate to put them on. The Trough has 1-3 inch firm snow
        / ice between 3-7 in of powder and ground, with loose rocks yet frozen firm.
        It's a pain both ways, not possible to glissade. Near the top of the Trough,
        sketchy boulder moves I had to jump to get over / back down. In the summer
        you can smear up the rocks, now you'll probably die if not properly executed.
        Once over the Trough, The Narrows wasn't too bad, but be sure to memorize
        the transition into Homestretch because you may descend further down and miss
        the entrance to the Narrows. Homestretch was sketchier than I thought as there
        are no ledges to stand on and the rock surface feels waxy (humidity?) For
        PNW hikers, I found it to be much worse than the granite on Vesper Peak which
        remains grippy in wet conditions. To make it more dangerous, there are streaks
        of ice, snow and water over these rocks. Glad the weather worked in my favor
        and didn't add trouble to route finding. Saw one other scrambler on the Keyhole
        route.</td></tr></table><table class=\"gray\" align=\"right\" width=\"50%\"><tr><td
